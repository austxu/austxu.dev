projects:
  - name: austxu.dev
    environments:
      - name: production
        services:
          - name: coup-api
            type: web
            runtime: python
            plan: free
            repo: https://github.com/austxu/coup-RL-bot
            branch: main
            buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt && python -m pip install -r requirements_web.txt
            startCommand: python web.py
            healthCheckPath: /health
            autoDeployTrigger: checksPass
            domains:
              - coup-api.austxu.dev
            envVars:
              - key: SECRET_KEY
                generateValue: true
              - key: COUP_ALLOWED_ORIGINS
                value: https://coup.austxu.dev,http://localhost:3000,http://localhost:5173

          - name: heston-api
            type: web
            runtime: docker
            plan: free
            repo: https://github.com/austxu/heston-regime-lab
            branch: master
            dockerfilePath: docker/Dockerfile.api
            healthCheckPath: /health
            autoDeployTrigger: checksPass
            domains:
              - heston-api.austxu.dev
            envVars:
              - key: ENVIRONMENT
                value: production
              - key: HRL_OFFLINE
                value: "1"
              - key: LOG_FORMAT
                value: json
              - key: CORS_ORIGINS
                value: https://heston.austxu.dev
              # Supply an external Redis/Valkey URL from Oracle, Railway, or another
              # Redis provider to preserve calibration and regime caches across restarts.
              - key: REDIS_URL
                sync: false
